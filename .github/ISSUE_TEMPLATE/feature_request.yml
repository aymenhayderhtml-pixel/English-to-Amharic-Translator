name: Feature request
description: Suggest an improvement or a new feature
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Explain the user need or workflow.
      placeholder: Users need...
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: Describe the feature you want.
      placeholder: Add...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any simpler or different options.
    validations:
      required: false

