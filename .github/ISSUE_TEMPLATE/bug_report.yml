name: Bug report
description: Report a problem in the web prototype, docs, or Android app
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem clearly.
      placeholder: The app...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: Describe the correct behavior.
      placeholder: I expected...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps that trigger the issue.
      placeholder: 1. ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Add screenshots, device info, or anything else useful.
    validations:
      required: false

